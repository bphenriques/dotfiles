# MPD config for MAX98357A I2S DAC with music from NAS (SMB mount)
music_directory    "/mnt/homelab-media/music/library"
playlist_directory "/mnt/homelab-media/music/playlists"
db_file            "/var/lib/mpd/database"
state_file         "/var/lib/mpd/state"
sticker_file       "/var/lib/mpd/sticker.sql"
bind_to_address    "0.0.0.0"
port               "6600"

audio_output {
    type        "alsa"
    name        "MAX98357A"
    device      "hw:sndrpihifiberry,0"
    mixer_type  "software"
}

playlist_plugin {
    name "m3u"
    as_directory "yes"
}

playlist_plugin {
    name "extm3u"
    as_directory "yes"
}

input {
    plugin "curl"
}
